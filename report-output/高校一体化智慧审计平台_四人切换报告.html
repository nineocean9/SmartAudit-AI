  <style>

    .cover{min-height:930px;display:flex;flex-direction:column;text-align:center;border-top:6px double var(--ink);border-bottom:1px solid var(--ink);padding:62px 20px 52px}.university{font-size:34px;letter-spacing:.5em;margin-right:-.5em;font-weight:700}.course{margin-top:38px;font-size:18px;letter-spacing:.42em;margin-right:-.42em}.cover h1{margin:100px auto 22px;max-width:650px;font-size:30px;line-height:1.5}.cover .subtitle{color:var(--accent);font-size:17px;letter-spacing:.08em}.meta{width:510px;max-width:100%;margin:86px auto 0;text-align:left;border-collapse:collapse;font-size:16px}.meta th,.meta td{padding:10px 8px;border-bottom:1px solid #444}.meta th{width:120px;text-align:justify;text-align-last:justify;font-weight:400}.term{margin-top:auto;font-size:15px;letter-spacing:.12em}

    .member-banner{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:end;margin:10px 0 24px;padding:20px 22px;color:#fff;background:#24211e}.member-banner small{display:block;margin-bottom:6px;color:#d6cfc4;font:12px var(--sans);letter-spacing:.12em}.member-banner strong{font-size:22px}.share{font:700 30px var(--sans);color:#e9b7a5}.code-path{padding:12px 14px;border:1px dashed #8a8276;background:#f7f4ed;font:13px/1.65 Consolas,"Microsoft YaHei",monospace;overflow-wrap:anywhere}.signoff{display:flex;justify-content:space-between;margin-top:60px;padding-top:18px;border-top:1px solid var(--rule);color:var(--muted);font-size:13px}.references p{padding-left:2em;text-indent:-2em;font-size:13px}.note{color:var(--muted);font:12.5px/1.7 var(--sans)}
    @media(max-width:760px){.toolbar{align-items:flex-start;flex-wrap:wrap}.brand{width:100%}.tabs{width:100%;overflow:auto}.tab{flex:1;white-space:nowrap}.print{position:absolute;right:16px;top:10px}.paper{width:100%;margin:0;padding:42px 24px;box-shadow:none}.cover{min-height:850px}.university{font-size:26px}.cover h1{margin-top:80px;font-size:25px}.flow{grid-template-columns:1fr 1fr}.flow div::after{display:none}.member-banner{grid-template-columns:1fr}.status{display:none}}

const members=[
 {id:'chen',name:'陈宇豪',sid:'221302101',share:'40%',role:'项目负责人，系统架构与AI智能审计核心',summary:'负责总体需求梳理、系统架构、数据库总体设计和核心技术集成，重点完成AI智能工作台、意图识别、RAG知识检索、项目文档解析与向量化、智能数据分析、风险扫描、文档核查和智能取证，并承担全系统核心联调。',modules:[['AI智能体与任务编排','构建统一自然语言入口，将用户指令拆分为项目查询、资料阅读、法规问答、数据分析、风险扫描、文档核查和取证任务，通过SSE持续推送执行过程与结果。'],['RAG知识检索','整合政策法规库、项目资料库、临时工作区、审计案例库和风险案例库。文档解析、切分后生成向量，使用pgvector完成语义召回。'],['文件解析与智能分析','使用Apache POI、PDFBox处理Word、Excel和PDF，支持CSV、TXT。实现数据分析驾驶舱、风险线索扫描、文档合规核查和六板块取证单生成。'],['核心联调与质量控制','统一模型配置、异常处理、调用日志和接口返回，完成AI模块与计划、项目、问题、整改、依据库之间的业务联动。']],flows:['用户输入 → ChatTaskParser解析意图 → 生成任务列表 → 顺序执行处理器 → SSE推送','文件上传 → 内容解析 → DocChunker切分 → Embedding → document_chunk入库','问题向量化 → 多知识源召回 → Prompt组装 → 大模型生成可追溯回答'],tests:['复合指令顺序执行与SSE完整性','Word、Excel、PDF等文件解析准确性','五类知识源的语义召回相关性','模型超时、限流和解析失败时的异常提示']},
 {id:'shi',name:'石雨淳',sid:'待填写',share:'20%',role:'审计信息管理、计划编排与准备阶段',summary:'负责审计信息管理基础底座，完成审计计划全生命周期、审计对象与领导干部库、项目批量编排、智能推荐、计划审批调整、穿透查询、项目成员分工、通知书和资料清单等功能。',modules:[['审计计划全生命周期','维护年度、专项和临时计划，支持批量编排、AI推荐审计对象、审批状态、动态调增调减、附件及变更日志。'],['审计对象全维度建库','统一维护被审计单位基础信息、组织架构、联系人、历史项目、问题整改和领导干部任职履历，支撑经济责任审计。'],['项目准备与资料收集','按项目类型匹配方案模板，配置审计事项和人员分工，生成通知书与资料清单，接收被审计单位分批提交的审前资料。'],['进度可视化管理','以计划时间、实际时间、阶段状态和人员完成度形成甘特图，支持穿透查看项目方案、资料、底稿和报告。']],flows:['年度计划建立 → 对象推荐 → 审批确认 → 批量生成项目','项目立项 → 成员分工 → 方案编制 → 通知书下发 → 资料确认','计划总览 → 项目穿透 → 阶段进度 → 逾期预警'],tests:['计划新增、调增调减和变更日志','单位与领导干部历史信息关联','通知书自动填充和资料清单状态流转','甘特图进度、逾期标识及穿透跳转']},
 {id:'luo',name:'骆旭林',sid:'待填写',share:'20%',role:'审计作业、问题整改与报告归档',summary:'负责一线审计协同工作台和整改闭环，完成方案与底稿、智能分析疑点回流、取证单、法规引用、多级复核、问题台账、整改下发、延期审批、销号审核、报告版本与项目归档。',modules:[['一站式审计作业','支持方案和底稿在线编制、审计事项分工、资料引用、数据分析疑点回流、多人协同和全过程操作留痕。'],['取证与多级复核','根据问题自动生成取证单和工作底稿，关联法规依据，配置主审、组长、审计处负责人1至N级复核，保留每轮修改记录。'],['整改闭环管理','内外源问题统一建账，批量下发整改任务，支持方案、材料、延期和持续整改申请，审核通过后销号，未达标则发起二次整改。'],['报告与档案管理','管理内审核稿、征求意见稿和正式定稿，多轮意见交互与版本差异对比；按五类档案目录自动归集全生命周期资料。']],flows:['底稿记录 → 问题确认 → 取证回复 → 多级复核 → 问题台账','整改下发 → 方案填报 → 材料上传 → 审核评价 → 销号或二次整改','报告初稿 → 征求意见 → 版本修订 → 终稿审批 → 项目归档'],tests:['多人编辑锁定与操作留痕','底稿复核未完成时的流程阻断','整改延期、持续整改及销号状态流转','报告版本对比和归档资料完整性校验']},
 {id:'mu',name:'穆再排尔',sid:'待填写',share:'20%',role:'依据库、驾驶舱、权限流程与云端部署',summary:'负责政策法规、风险和案例三类知识库，数据驾驶舱、可配置审批流程和细粒度权限，并完成PostgreSQL、pgvector、JDK、Nginx等云服务器环境配置、前后端发布、反向代理、运行检查和备份维护。',modules:[['审计依据与案例库','分级维护国家法规、教育行业制度和校内制度，标记有效状态及上下位法关系；沉淀问题风险条目和典型案例，支持全文和语义检索。'],['数据驾驶舱','使用柱状图、折线图、饼图、热力图、甘特图和明细表展示项目、问题、整改、资金风险与人员负载，并支持逐层下钻。'],['审批与权限体系','配置审批人、会签、条件分支和抄送节点；基于机构、用户、角色、数据和功能五维模型控制菜单、按钮、项目与单位数据，中介授权到期自动回收。'],['云服务器部署','安装JDK 21、PostgreSQL、pgvector和Nginx，导入数据库脚本，发布Spring Boot Jar和Vue dist，配置API反向代理、安全组、日志、上传目录、进程守护与备份。']],flows:['知识文件导入 → 分类审核 → 状态发布 → 向量化 → 业务引用','审批模板设计 → 条件路由 → 待办推送 → 意见留痕 → 流程归档','环境初始化 → 数据库部署 → 后端发布 → 前端托管 → Nginx代理 → 上线巡检'],tests:['法规状态、关联关系和语义检索','驾驶舱统计口径及数据下钻','不同角色菜单、按钮和数据隔离','云端登录、上传、AI调用、SSE、日志与备份']}
];
let active=localStorage.getItem('audit-report-member')||'chen';
if(!members.some(m=>m.id===active)) active='chen';
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function renderTabs(){document.getElementById('memberTabs').innerHTML=members.map((m,i)=>`<button class="tab" role="tab" aria-selected="${m.id===active}" tabindex="${m.id===active?0:-1}" data-id="${m.id}">${m.name}</button>`).join('');document.querySelectorAll('.tab').forEach((b,i)=>{b.onclick=()=>switchTo(b.dataset.id);b.onkeydown=e=>{if(!['ArrowLeft','ArrowRight','Home','End'].includes(e.key))return;e.preventDefault();let n=e.key==='Home'?0:e.key==='End'?members.length-1:(i+(e.key==='ArrowRight'?1:-1)+members.length)%members.length;switchTo(members[n].id);document.querySelectorAll('.tab')[n].focus()}})}
function switchTo(id){active=id;localStorage.setItem('audit-report-member',id);renderTabs();renderReport();window.scrollTo({top:0,behavior:'smooth'})}
function hModules(m){return m.modules.map((x,i)=>`<h3>4.${i+2} ${esc(x[0])}</h3><p>${esc(x[1])}</p>`).join('')}
function renderReport(){const m=members.find(x=>x.id===active);document.getElementById('status').textContent=`当前报告：${m.name}，工作量 ${m.share}，${m.role}`;const report=document.getElementById('report');report.classList.remove('switching');void report.offsetWidth;report.classList.add('switching');report.innerHTML=`
<section class="cover"><div class="university">扬州大学</div><div class="course">项目综合实践 III</div><h1>高校一体化智慧审计平台<br>设计与实现</h1><div class="subtitle">AI智能体驱动的审计全生命周期协同平台</div><table class="meta"><tr><th>学生姓名</th><td>${esc(m.name)}</td></tr><tr><th>班级</th><td>计科2201</td></tr><tr><th>学号</th><td>${esc(m.sid)}</td></tr><tr><th>项目成员</th><td>陈宇豪、石雨淳、骆旭林、穆再排尔</td></tr><tr><th>个人分工</th><td>${esc(m.role)}</td></tr></table><div class="term">2025－2026 学年第二学期</div></section>
<section class="chapter"><h2>一、项目实践目的与要求</h2><h3>1.1 实践目的</h3><p class="lead">本项目面向高校审计处、校领导、被审计单位和社会审计机构，建设覆盖审计信息、协同作业、问题整改、知识依据、决策分析、智能辅助和流程审批的一体化平台。</p><p>通过项目实践，综合运用Vue 3、Spring Boot、MyBatis、PostgreSQL、pgvector、ECharts及大模型应用技术，掌握需求分析、系统设计、数据库建模、前后端开发、权限隔离、联调测试和云服务器部署的完整软件工程过程。</p><h3>1.2 建设要求</h3><ul><li>形成审计计划、准备、实施、报告、整改和归档的业务闭环。</li><li>实现法规、风险、案例和项目资料的统一管理与语义检索。</li><li>将AI问答、项目查询、智能分析、风险扫描和文档核查嵌入业务过程。</li><li>支持审批流自主配置、五维权限控制、移动协同及云端部署。</li></ul><h3>1.3 团队分工</h3><table class="allocation"><thead><tr><th>成员</th><th>工作量</th><th>主要负责内容</th></tr></thead><tbody>${members.map(x=>`<tr class="${x.id===m.id?'active-row':''}"><td>${x.name}</td><td><span class="tag">${x.share}</span></td><td>${x.role}</td></tr>`).join('')}</tbody></table></section>
<section class="chapter"><h2>二、需求分析</h2><h3>2.1 核心用户</h3><table><thead><tr><th>用户</th><th>主要需求</th><th>数据边界</th></tr></thead><tbody><tr><td>校领导</td><td>全校审计总览、整改成效、重大风险预警</td><td>汇总数据为主，明细需临时授权</td></tr><tr><td>审计部门</td><td>计划、作业、复核、报告、整改与系统配置</td><td>按岗位和项目职责授权</td></tr><tr><td>被审计单位</td><td>资料提交、取证回复、整改填报和报告查看</td><td>仅本单位业务数据</td></tr><tr><td>中介人员</td><td>项目资料、底稿与作业录入</td><td>仅服务期内获授项目</td></tr></tbody></table><h3>2.2 功能范围</h3><ol><li><b>审计信息管理：</b>计划全生命周期、对象库、领导干部库和进度统筹。</li><li><b>审计作业管理：</b>准备、实施、取证、底稿复核、报告和归档。</li><li><b>整改管理：</b>问题建账、任务下发、材料填报、延期审批、审核销号和成效分析。</li><li><b>知识与决策：</b>法规、风险、案例库，数据驾驶舱和逐层下钻。</li><li><b>平台能力：</b>AI智能体、审批流设计、五维权限、日志和移动协同。</li></ol></section>
<section class="chapter"><h2>三、总体设计</h2><h3>3.1 技术架构</h3><table><thead><tr><th>层次</th><th>技术组成</th><th>职责</th></tr></thead><tbody><tr><td>表示层</td><td>Vue 3、Element Plus、ECharts</td><td>业务交互、动态路由、图表和AI流式展示</td></tr><tr><td>接口层</td><td>Spring MVC、REST、SSE</td><td>统一接口、鉴权、参数校验和流式推送</td></tr><tr><td>业务层</td><td>Spring Boot、MyBatis、LangChain4j</td><td>审计流程、任务编排、知识检索与模型调用</td></tr><tr><td>数据层</td><td>PostgreSQL、pgvector、文件存储</td><td>业务数据、文档内容、向量和成果文件</td></tr><tr><td>部署层</td><td>Linux、JDK 21、Nginx</td><td>静态托管、反向代理、进程守护和日志</td></tr></tbody></table><h3>3.2 审计全生命周期</h3><div class="flow"><div><b>01 计划</b>对象推荐与立项审批</div><div><b>02 准备</b>方案、通知与资料清单</div><div><b>03 实施</b>分析、取证、底稿复核</div><div><b>04 报告</b>版本、意见与审批</div><div><b>05 整改</b>下发、填报、审核销号</div><div><b>06 归档</b>自动归集与借阅审批</div><div><b>07 沉淀</b>法规、风险和案例知识</div><div><b>08 决策</b>驾驶舱、预警和计划反哺</div></div><h3>3.3 数据设计</h3><p>系统以审计项目为聚合中心，计划、对象、成员、通知书、资料、方案、底稿、问题、整改、报告和档案通过项目编号关联；AI会话、项目文档、文本切块、分析结果和调用日志形成智能能力数据链。</p></section>
<section class="chapter"><h2>四、个人完成的功能及实现</h2><div class="member-banner"><div><small>当前成员 / PERSONAL CONTRIBUTION</small><strong>${esc(m.name)} · ${esc(m.role)}</strong></div><div class="share">${esc(m.share)}</div></div><h3>4.1 个人工作概述</h3><p>${esc(m.summary)}</p>${hModules(m)}<div class="callout"><p><b>分工一致性说明：</b>个人报告、答辩展示、项目文件责任标注及主要源代码说明应保持一致。个人章节只展示本人负责模块的界面、接口、数据库表和关键代码。</p></div></section>
<section class="chapter"><h2>五、关键流程与代码责任</h2>${m.flows.map((x,i)=>`<h3>5.${i+1} ${['核心业务流程','数据或知识处理流程','交付与运行流程'][i]||'实现流程'}</h3><div class="code-path">${esc(x)}</div>`).join('')}<h3>5.4 代码分层说明</h3><p>前端页面负责查询、表单、状态反馈和权限按钮；API模块封装请求；后端Controller负责接口与权限校验，Service负责业务规则与事务，Mapper及XML负责PostgreSQL数据访问。公共异常处理、统一返回和操作日志保证模块行为一致。</p></section>
<section class="chapter"><h2>六、测试与验收</h2><h3>6.1 测试环境</h3><p>客户端使用Chrome和Edge，前端基于Node.js与Vite，后端运行于JDK 21，数据库采用PostgreSQL与pgvector。测试覆盖正常、空值、边界、越权、并发和服务异常场景。</p><h3>6.2 个人模块测试</h3><table><thead><tr><th>序号</th><th>测试项</th><th>预期结果</th></tr></thead><tbody>${m.tests.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x)}</td><td>流程正确、数据一致、提示明确</td></tr>`).join('')}</tbody></table><h3>6.3 验收结论</h3><p>主要业务流程能够闭环运行，角色与数据权限符合预期，个人负责功能与其他模块完成联调。对测试中发现的参数校验、状态同步和异常提示问题完成修复并回归验证。</p></section>
<section class="chapter"><h2>七、云服务器部署</h2><h3>7.1 环境与安全</h3><p>云服务器采用Linux，安装JDK 21、PostgreSQL、pgvector和Nginx。安全组仅开放Web和必要管理端口，数据库不直接暴露公网；生产配置通过环境变量或独立配置文件管理。</p><h3>7.2 发布流程</h3><div class="flow"><div><b>01</b>初始化服务器与目录</div><div><b>02</b>导入数据库脚本</div><div><b>03</b>Maven构建后端Jar</div><div><b>04</b>Vite构建前端dist</div><div><b>05</b>Nginx反向代理</div><div><b>06</b>配置进程守护</div><div><b>07</b>功能与权限巡检</div><div><b>08</b>日志备份与维护</div></div><h3>7.3 上线检查</h3><ul><li>登录、动态菜单、按钮权限和数据范围隔离正常。</li><li>文件上传、解析、下载和存储路径权限正常。</li><li>AI模型调用、向量检索、SSE推送和超时策略正常。</li><li>审计项目、整改、报告、归档和驾驶舱数据一致。</li></ul></section>
<section class="chapter"><h2>八、总结与展望</h2><p>本项目将传统审计业务流程、知识管理、数据分析和大模型能力整合到统一平台，既关注一线审计人员的协同效率，也兼顾校领导决策、被审计单位整改和中介人员临时作业。通过本次实践，团队完成了从业务抽象到系统落地的完整训练。</p><p>后续可继续完善流程引擎图形化设计、移动端企业微信集成、AI结果评价、自动化测试、模型成本统计、运维监控和跨系统数据交换，进一步提高平台的可靠性与可推广性。</p><h3>个人实践总结</h3><p>${esc(m.name)}在项目中承担${esc(m.share)}工作量，负责${esc(m.role)}。通过该部分工作，加深了对模块边界、数据一致性、权限安全、联调测试和工程化交付的理解。</p><div class="signoff"><span>报告人：${esc(m.name)}</span><span>项目：高校一体化智慧审计平台</span></div></section>

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ruoyi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ry-vue}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/sql:ro
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/10-project-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ruoyi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: ruoyi-backend
    restart: unless-stopped
    # 调试时可取消注释端口映射，生产环境请保持注释
    # ports:
    #   - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ry-vue}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUOYI_PROFILE: /data/uploadPath
      TOKEN_SECRET: ${TOKEN_SECRET}
      AI_MODEL_API_KEY: ${AI_MODEL_API_KEY:-}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
    volumes:
      - upload_data:/data/uploadPath

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: ruoyi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
  redis_data:
  upload_data:

# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: ${RUOYI_PROFILE:D:/ruoyi/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # 演示环境返回验证码明文，便于测试账号一键切换；正式环境请改为 false
  demoCaptchaEnabled: false

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: ${REDIS_HOST:localhost}
      # 端口，默认为6379
      port: ${REDIS_PORT:6379}
      # 数据库索引
      database: 0
      # 密码
      password: ${REDIS_PASSWORD:}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: postgresql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*






#  AI 模型配置 —— 添加到 ruoyi 的 application.yml
#  切换模型只需修改 provider + 对应的 api-key / model-name
# ============================================================

ai:
  model:
    # ── 当前启用的提供商 ────────────────────────────────────────
    # 可选值: dashscope | openai | mimo | deepseek | ollama
    provider: mimo

    # ── API Key（dashscope / openai / mimo / deepseek 需要）────────────
    api-key: ${AI_MODEL_API_KEY:}

    # ── 模型名称 ────────────────────────────────────────────────
    # dashscope : qwen-turbo（快/便宜）| qwen-plus（均衡）| qwen-max（最强）
    # openai    : gpt-4o-mini | gpt-4o
    # mimo      : mimo-v2.5-pro
    # deepseek  : deepseek-v4-flash | deepseek-reasoner
    # ollama    : qwen2.5 | llama3.2 | mistral（本地运行）
    model-name: mimo-v2.5-pro

    # ── OpenAI 兼容接口专用（openai provider 时填写）────────────
    # base-url: https://api.openai.com/v1

    # ── 通用参数 ────────────────────────────────────────────────
    max-tokens: 8192
    temperature: 0.7
    max-history-messages: 20

    # ── 系统提示词（支持自定义 AI 角色与行为）───────────────────
    system-prompt: |
      你是高校一体化智慧审计平台的AI审计助手。你的职责是：
      1. 回答用户关于审计法规、制度、流程的问题，必须引用具体的审计依据（法规名称+条款号）
      2. 对上传的审计文件进行合规校验，指出不符合规定的具体条款
      3. 根据问题描述匹配相关法规依据
      4. 辅助生成标准化审计取证单（含审计问题、引用依据、整改建议）

      工作原则：
      - 所有结论必须引用具体的审计依据，格式：【依据:审计法第十六条】
      - 如果检索到的依据不足以支持结论，回复"建议人工复核，依据不足"
      - 回答结构：先给结论，再列依据编号和原文，最后给出建议
      - 严禁编造不存在的法规条款
      - 对于审计问题定性，使用规范的法律语言和审计专业术语

    # ── 分角色系统提示词（对应 workspace 模式）──────────────────
    system-prompts:
      policy: |
        你是高校审计法规助手。你的职责是：
        1. 回答用户关于高校审计法规、制度、流程的问题，必须引用具体的审计依据
        2. 回答格式：**结论**（1-2句话） → **依据**（格式：【依据:法规名 第X条】+原文摘要） → **建议**（操作建议）
        3. 如果依据不足以回答问题，明确说明"建议人工复核，当前法规库中未查到明确规定"
        4. 严禁编造不存在的法规条款
      project: |
        你是审计项目助手。你的职责是：
        1. 基于提供的项目资料和项目结构化数据回答用户关于审计项目的问题
        2. 回答时引用具体的资料来源（文档名/底稿名/报告名）
        3. 如果用户问题超出了提供的项目资料范围，请明确告知，并在回复末尾加上 {{OUT_OF_SCOPE}} 标记
        4. 能够综合分析项目的方案、底稿、报告、整改等各阶段资料
      data: |
        你是审计数据分析助手。你的职责是：
        1. 基于用户上传的数据文件或系统数据进行统计分析
        2. 输出结构化分析报告：**总体情况** → **异常统计** → **风险提示** → **审计建议**
        3. 如果数据不足以分析，请明确说明需要哪些补充数据
        4. 对异常数据要标注风险等级（高/中/低）

    # ── 向量化（Embedding）配置 ────────────────────────────────
    embedding:
      # 提供商: dashscope
      provider: dashscope
      # API Key（留空则复用 chat 的 api-key；百炼 API Key 以 sk- 开头）
      api-key: ${AI_EMBEDDING_API_KEY:}
      # 模型: text-embedding-v4(最新/1024维) | text-embedding-v3(1024维)
      model: text-embedding-v4
      # 百炼兼容接口地址（{WorkspaceId} 替换为你的业务空间ID）
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

# ============================================================
#  切换示例
# ============================================================
#
#  → 切换为 DeepSeek：
#    provider: deepseek
#    api-key: sk-deepseek的key
